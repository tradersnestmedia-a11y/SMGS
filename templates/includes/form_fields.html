{% for field in form %}
    <div class="{% if field.field.widget.input_type == 'textarea' %}col-12{% else %}col-md-6{% endif %}">
        <label class="form-label fw-semibold" for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {% if field.help_text %}
            <div class="form-text">{{ field.help_text }}</div>
        {% endif %}
        {% for error in field.errors %}
            <div class="text-danger small mt-1">{{ error }}</div>
        {% endfor %}
    </div>
{% endfor %}
{% for error in form.non_field_errors %}
    <div class="col-12">
        <div class="alert alert-danger rounded-4">{{ error }}</div>
    </div>
{% endfor %}
